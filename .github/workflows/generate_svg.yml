name: Generate Profile SVG

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python generate_svg.py
          python generate_personal_svg.py

      - name: Generate Space Shooter
        uses: kiyo-n-zane/gh-space-shooter@v2
        with:
          github_user_name: jeevapriyan10

      - name: Commit and push SVG
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg personal_mode.svg dist/space_shooter.svg
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: regenerate profile SVGs"
          git pull --rebase origin main
          git push
